spring.application.name=assignment

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.datasource.url=jdbc:h2:mem:fyaora-db
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=test
spring.datasource.password=test

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true

api.open-meteo.endpoint=https://api.open-meteo.com
# api.open-meteo.endpoint=https://unreachable.com // for testing unreachable api only

spring.mvc.throw-exception-if-no-handler-found=true
spring.web.resources.add-mappings=false
